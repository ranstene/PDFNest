<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">PDFNest logo</title>
  <desc id="desc">A layered PDF document with private browser tool symbols.</desc>
  <defs>
    <linearGradient id="tile" x1="82" y1="52" x2="430" y2="462" gradientUnits="userSpaceOnUse">
